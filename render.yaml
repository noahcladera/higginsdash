# Render Blueprint — https://render.com/docs/blueprint-spec
# After connect: set env vars from .env.example (Supabase + NEXT_PUBLIC_SITE_URL).
services:
  - type: web
    name: higgins-portal
    runtime: node
    plan: free
    buildCommand: npm ci && npx prisma generate && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
