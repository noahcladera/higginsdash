<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Higgins Tennis — Classes</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/main.css">
<style>
.cl-page{display:grid;grid-template-columns:220px 1fr;min-height:calc(100vh - 170px);gap:0;}
@media(max-width:960px){.cl-page{grid-template-columns:1fr;}}
.cl-sidebar{background:var(--s0);padding:20px 16px;border-right:1px solid var(--b2);}
.cl-main{padding:24px 32px;min-height:0;}
.cl-toolbar{display:flex;align-items:center;gap:16px;margin-bottom:20px;flex-wrap:wrap;}
.cl-toolbar select{background:var(--s2);border:1px solid var(--b2);color:var(--t1);font-size:13px;padding:8px 12px;border-radius:4px;}
.cl-toolbar input[type="search"]{flex:1;min-width:180px;background:var(--s2);border:1px solid var(--b2);color:var(--t1);font-size:13px;padding:8px 12px;border-radius:4px;}
.cl-toolbar input:focus,.cl-toolbar select:focus{outline:none;border-color:var(--orange);}

.cl-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:24px;}
.cl-stat{background:var(--s1);border:1px solid var(--b2);border-radius:7px;padding:14px 18px;}
.cl-stat-val{font-size:22px;font-weight:700;color:var(--c-triaz);}
.cl-stat-lbl{font-size:10px;color:var(--t4);margin-top:4px;}

.cl-prog-list{display:flex;flex-direction:column;gap:6px;}
.cl-prog-item{padding:10px 12px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:500;transition:all .15s;border:1px solid transparent;}
.cl-prog-item:hover{background:var(--s2);}
.cl-prog-item.sel{background:var(--s2);border-color:var(--orange);}
.cl-prog-item .dot{width:6px;height:6px;border-radius:2px;display:inline-block;margin-right:8px;vertical-align:middle;}
.cl-prog-item .cnt{float:right;font-size:10px;color:var(--t4);}

.cl-class-list{display:flex;flex-direction:column;gap:8px;}
.cl-class-card{background:var(--s1);border:1px solid var(--b2);border-radius:7px;overflow:hidden;cursor:pointer;transition:all .15s;}
.cl-class-card:hover{border-color:var(--b3);}
.cl-class-card.exp{border-color:var(--orange);}
.cl-class-row{display:grid;grid-template-columns:1fr 80px 120px 100px;gap:12px;align-items:center;padding:12px 16px;}
.cl-class-name{font-size:13px;font-weight:600;}
.cl-class-meta{font-size:11px;color:var(--t4);margin-top:2px;}
.cl-class-enroll{font-family:"DM Mono",monospace;font-size:12px;text-align:right;}
.cl-class-bar{height:4px;background:var(--b2);border-radius:2px;overflow:hidden;margin-top:6px;}
.cl-class-bar-fill{height:100%;border-radius:2px;background:var(--c-triaz);}

.cl-class-detail{display:none;padding:16px 20px;border-top:1px solid var(--b2);background:var(--s2);}
.cl-class-detail.show{display:block;}
.cl-detail-h{font-size:11px;font-weight:600;color:var(--t4);margin-bottom:10px;}
.cl-student-list{display:flex;flex-wrap:wrap;gap:8px;}
.cl-student-chip{display:inline-flex;align-items:center;gap:6px;padding:6px 10px;background:var(--s1);border:1px solid var(--b2);border-radius:4px;font-size:11px;}
.cl-student-chip button{background:none;border:none;color:var(--t4);cursor:pointer;font-size:14px;line-height:1;padding:0 2px;}
.cl-student-chip button:hover{color:var(--neg);}
.cl-add-student-wrap{position:relative;}
.cl-add-student-btn{padding:6px 12px;background:var(--s3);border:1px dashed var(--b2);border-radius:4px;font-size:11px;color:var(--t3);cursor:pointer;}
.cl-add-student-btn:hover{border-color:var(--orange);color:var(--orange);}
.cl-student-dropdown{position:absolute;top:100%;left:0;right:0;margin-top:4px;max-height:200px;overflow-y:auto;background:var(--s1);border:1px solid var(--b2);border-radius:4px;z-index:10;box-shadow:0 4px 12px rgba(0,0,0,.3);}
.cl-student-opt{padding:8px 12px;font-size:12px;cursor:pointer;}
.cl-student-opt:hover{background:var(--s2);}

.cl-btn{background:var(--orange);color:#000;border:none;padding:8px 18px;font-weight:600;font-size:12px;border-radius:4px;cursor:pointer;}
.cl-btn:hover{filter:brightness(1.08);}
.cl-btn.secondary{background:var(--s2);color:var(--t2);border:1px solid var(--b2);}
.cl-btn.danger{background:transparent;color:#e74;border:1px solid #e74;}
.cl-empty{padding:48px 20px;text-align:center;color:var(--t4);font-size:13px;}
.hidden{display:none!important;}

.cl-dot{width:8px;height:8px;border-radius:2px;display:inline-block;margin-right:6px;vertical-align:middle;}
.cl-dot.triaz{background:var(--c-triaz);}
.cl-dot.randwijck{background:var(--c-rand);}
.cl-dot.school{background:var(--c-school);}
.cl-dot.gocap{background:var(--c-gocap);}
.cl-dot.private{background:var(--t4);}

/* Editor modal */
.cl-mo{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;visibility:hidden;transition:opacity .15s,visibility .15s;}
.cl-mo.open{opacity:1;visibility:visible;}
.cl-mdl{background:var(--s1);border:1px solid var(--b2);border-radius:10px;max-width:560px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 12px 40px rgba(0,0,0,.4);}
.cl-mdl-h{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--b2);}
.cl-mdl-t{font-size:18px;font-weight:700;}
.cl-mdl-c{padding:20px 24px;}
.cl-sec{margin-bottom:24px;}
.cl-sec-t{font-size:11px;font-weight:600;letter-spacing:0.5px;color:var(--t4);text-transform:uppercase;margin-bottom:12px;padding-bottom:6px;border-bottom:1px solid var(--b1);}
.cl-frow{margin-bottom:14px;}
.cl-frow label{display:block;font-size:11px;font-weight:500;color:var(--t3);margin-bottom:4px;}
.cl-frow input,.cl-frow select,.cl-frow textarea{width:100%;background:var(--s2);border:1px solid var(--b2);color:var(--t1);font-size:13px;padding:8px 10px;border-radius:4px;}
.cl-frow input:focus,.cl-frow select:focus{outline:none;border-color:var(--orange);}
.cl-frow-inline{display:flex;gap:12px;align-items:center;}
.cl-frow-inline .cl-frow{flex:1;margin-bottom:0;}
.cl-frow-inline label{display:none;}
.cl-toggle{display:flex;gap:8px;}
.cl-toggle label{display:flex;align-items:center;gap:6px;cursor:pointer;font-size:13px;color:var(--t2);}
.cl-toggle input{width:auto;}
.cl-chips{display:flex;flex-wrap:wrap;gap:8px;}
.cl-chip{padding:5px 12px;background:var(--s2);border:1px solid var(--b2);border-radius:4px;font-size:11px;cursor:pointer;transition:all .15s;}
.cl-chip:hover,.cl-chip.sel{background:var(--orange);color:#000;border-color:var(--orange);}
.cl-pay-row{display:flex;gap:10px;align-items:center;margin-bottom:8px;}
.cl-pay-row input{flex:1;max-width:100px;}
.cl-pay-row span{font-size:12px;color:var(--t3);min-width:80px;}
.cl-mdl-f{display:flex;gap:10px;justify-content:flex-end;padding:16px 24px;border-top:1px solid var(--b2);flex-wrap:wrap;}
.cl-mdl-f .cl-btn.danger{margin-right:auto;}
/* No-class date picker */
.noclass-calendar{background:var(--s2);border:1px solid var(--b2);border-radius:6px;padding:12px;margin-bottom:10px;}
.noclass-calendar-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;font-size:12px;font-weight:600;}
.noclass-calendar-header button{background:var(--s3);border:1px solid var(--b2);color:var(--t2);padding:4px 10px;border-radius:4px;cursor:pointer;font-size:11px;}
.noclass-calendar-header button:hover{border-color:var(--orange);color:var(--orange);}
.noclass-calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;font-size:10px;}
.noclass-calendar-dow{text-align:center;color:var(--t4);font-weight:600;padding:4px 0;}
.noclass-calendar-day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:4px;cursor:pointer;transition:all .12s;}
.noclass-calendar-day:hover{background:var(--s3);}
.noclass-calendar-day.other{color:var(--t4);opacity:.5;}
.noclass-calendar-day.sel{background:var(--c-rand-bg);color:var(--c-rand);border:1px solid var(--c-rand-bd);}
.noclass-chips{display:flex;flex-wrap:wrap;gap:6px;min-height:24px;}
.noclass-chip{display:inline-flex;align-items:center;gap:4px;padding:4px 8px;background:var(--c-rand-bg);border:1px solid var(--c-rand-bd);border-radius:4px;font-size:10px;font-family:"DM Mono",monospace;}
.noclass-chip button{background:none;border:none;color:var(--t4);cursor:pointer;font-size:12px;line-height:1;padding:0 2px;}
.noclass-chip button:hover{color:var(--neg);}
</style>
</head>
<body>
<header>
  <a class="logo" href="/"><img class="logo-img" src="/assets/logo.avif" alt="Higgins Tennis" /><span class="logo-tag">OPS</span></a>
  <div style="display:flex;align-items:center;gap:12px;">
    <button class="theme-toggle" id="themeToggle" title="Toggle light/dark">Theme</button>
  </div>
</header>
<nav>
  <a class="ni" href="/">Home</a>
  <a class="ni" href="/calendar">Calendar</a>
  <a class="ni active" href="/classes">Classes</a>
  <a class="ni" href="/coaches">Coaches</a>
  <a class="ni" href="/students">Students</a>
  <a class="ni" href="/seasons">Seasons</a>
  <a class="ni" href="/finance">Finance</a>
</nav>

<div class="cl-page">
  <aside class="cl-sidebar">
    <div class="cl-sec-t">Programs</div>
    <div class="cl-prog-list" id="programList"></div>
  </aside>
  <main class="cl-main">
    <div class="cl-toolbar">
      <select id="termFilter" onchange="load()">
        <option value="">All terms</option>
      </select>
      <input type="search" id="searchInput" placeholder="Search classes…" oninput="debouncedFilter()">
      <button class="cl-btn" onclick="openEditor()">+ New class</button>
    </div>

    <div class="cl-stats">
      <div class="cl-stat"><div class="cl-stat-val" id="statPrograms">—</div><div class="cl-stat-lbl">Programs</div></div>
      <div class="cl-stat"><div class="cl-stat-val" id="statStudents">—</div><div class="cl-stat-lbl">Enrolled</div></div>
      <div class="cl-stat"><div class="cl-stat-val" id="statRevenue">—</div><div class="cl-stat-lbl">Revenue</div></div>
      <div class="cl-stat"><div class="cl-stat-val" id="statCapacity">—</div><div class="cl-stat-lbl">Capacity</div></div>
    </div>

    <div class="cl-class-list" id="classList"></div>
    <div class="cl-empty hidden" id="emptyMsg">No classes. Select a program or create one with + New class.</div>
  </main>
</div>

<div class="cl-mo" id="editorMo" onclick="if(event.target===this)closeEditor()">
  <div class="cl-mdl">
    <div class="cl-mdl-h">
      <span class="cl-mdl-t" id="editorTitle">New class</span>
      <button class="cl-btn secondary" onclick="closeEditor()">✕</button>
    </div>
    <form id="editorForm" onsubmit="return saveClass(event)">
      <div class="cl-mdl-c">
        <div class="cl-sec">
          <div class="cl-sec-t">Basic info</div>
          <div class="cl-frow"><label>Program name</label><input type="text" id="fName" class="form-input" placeholder="e.g. Adult Intermediate Triaz" required></div>
          <div class="cl-frow">
            <label>Type</label>
            <select id="fType" onchange="onTypeChange()">
              <option value="Club">Club</option>
              <option value="School">School</option>
              <option value="GoCAP">GoCAP</option>
              <option value="Private">Private</option>
            </select>
          </div>
          <div class="cl-frow">
            <label>Delivery</label>
            <div class="cl-toggle">
              <label><input type="radio" name="delivery" value="onsite" checked onchange="onDeliveryChange()"> Onsite</label>
              <label><input type="radio" name="delivery" value="pickup" onchange="onDeliveryChange()"> Pickup</label>
            </div>
          </div>
          <div class="cl-frow"><label>Program</label><select id="fProgram"></select></div>
          <div class="cl-frow"><label>Age group</label><input type="text" id="fAge" placeholder="e.g. 6-9, Adult"></div>
          <div class="cl-frow">
            <label>Location</label>
            <select id="fLoc">
              <option value="Triaz">Triaz</option>
              <option value="Randwijck">Randwijck</option>
              <option value="VU">VU</option>
              <option value="AICS South Campus">AICS South Campus</option>
              <option value="AJErnstraat">AJErnstraat</option>
            </select>
          </div>
        </div>
        <div class="cl-sec">
          <div class="cl-sec-t">Schedule</div>
          <div class="cl-frow"><label>Day of week</label>
            <select id="fDay">
              <option value="Monday">Monday</option>
              <option value="Tuesday">Tuesday</option>
              <option value="Wednesday">Wednesday</option>
              <option value="Thursday">Thursday</option>
              <option value="Friday">Friday</option>
              <option value="Saturday">Saturday</option>
              <option value="Sunday">Sunday</option>
            </select>
          </div>
          <div id="onsiteTimes">
            <div class="cl-frow-inline">
              <div class="cl-frow"><label>Start</label><select id="fStart" class="form-select" required></select></div>
              <span>–</span>
              <div class="cl-frow"><label>End</label><select id="fEnd" class="form-select" required></select></div>
            </div>
          </div>
          <div id="pickupTimes" class="hidden">
            <div class="cl-frow"><label>Pickup time</label><select id="fPickup" class="form-select"></select></div>
            <div class="cl-frow"><label>Lesson start</label><select id="fLessonStart" class="form-select"></select></div>
            <div class="cl-frow"><label>Lesson end</label><select id="fLessonEnd" class="form-select"></select></div>
          </div>
          <div class="cl-frow"><label>Term</label><select id="fTerm" onchange="onTermChange()"></select></div>
          <div class="cl-frow" id="customRangeRow" style="display:none">
            <label>Custom date range</label>
            <div class="cl-frow-inline">
              <div class="cl-frow"><input type="date" id="fTermStart"></div>
              <span>–</span>
              <div class="cl-frow"><input type="date" id="fTermEnd"></div>
            </div>
          </div>
          <div class="cl-frow">
            <label>No-class dates</label>
            <div id="noClassPickerWrap">
              <div class="noclass-calendar" id="noClassCalendar"></div>
              <div class="noclass-chips" id="noClassChips"></div>
            </div>
          </div>
        </div>
        <div class="cl-sec">
          <div class="cl-sec-t">Capacity & Financials</div>
          <div class="cl-frow"><label>Max participants</label><input type="number" id="fMax" min="0" value="0"></div>
          <div class="cl-frow"><label>Cost per class (€)</label><input type="number" id="fCost" min="0" step="0.01" placeholder="0"></div>
          <div class="cl-frow"><label>Court fee per session (€)</label><input type="number" id="fCourtFee" min="0" step="0.01" value="0"></div>
        </div>
        <div class="cl-sec">
          <div class="cl-sec-t">Coaches</div>
          <div class="cl-frow"><label>Select coaches</label><div class="cl-chips" id="coachChips"></div></div>
          <div id="coachPayRows"></div>
          <div class="cl-frow"><label>Notes</label><input type="text" id="fNotes" class="form-input" placeholder="Optional notes"></div>
        </div>
      </div>
      <div class="cl-mdl-f">
        <button type="button" class="cl-btn danger" id="btnDelete" style="display:none" onclick="deleteClass()">Delete</button>
        <button type="button" class="cl-btn secondary" onclick="closeEditor()">Cancel</button>
        <button type="submit" class="cl-btn">Save</button>
      </div>
    </form>
  </div>
</div>

<script src="/js/shared.js"></script>
<script>
const HT = window.HT;
let programs = [];
let allTemplates = [];
let filteredTemplates = [];
let allCoaches = [];
let studentMap = {};
let selectedProgramId = null;
let expandedId = null;
let editingId = null;
let searchT = null;

const DAYS = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
let noClassDatesSet = new Set();

function toDateStr(d) {
  const y = d.getFullYear(), m = String(d.getMonth() + 1).padStart(2, '0'), day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function populateTimeSelects() {
  const opts = HT.buildTimeOptions();
  ['fStart','fEnd','fPickup','fLessonStart','fLessonEnd'].forEach(id => {
    const sel = document.getElementById(id);
    if (!sel || sel.options.length > 0) return;
    opts.forEach(o => {
      const opt = document.createElement('option');
      opt.value = o.value;
      opt.textContent = o.label;
      sel.appendChild(opt);
    });
  });
}

let noClassPickerRender = null;
function initNoClassPicker(seasonRange) {
  const wrap = document.getElementById('noClassCalendar');
  const chipsWrap = document.getElementById('noClassChips');
  let viewDate = new Date();
  if (seasonRange?.start) viewDate = new Date(seasonRange.start + 'T12:00:00');
  function render() {
    const y = viewDate.getFullYear(), m = viewDate.getMonth();
    const first = new Date(y, m, 1);
    const last = new Date(y, m + 1, 0);
    const startPad = (first.getDay() + 6) % 7;
    const days = [];
    for (let i = 0; i < startPad; i++) days.push({ d: '', other: true });
    for (let d = 1; d <= last.getDate(); d++) days.push({ d: toDateStr(new Date(y, m, d)), other: false });
    wrap.innerHTML = `
      <div class="noclass-calendar-header">
        <button type="button" onclick="noclassPrevMonth()">←</button>
        <span>${first.toLocaleDateString('en-GB',{month:'long',year:'numeric'})}</span>
        <button type="button" onclick="noclassNextMonth()">→</button>
      </div>
      <div class="noclass-calendar-grid">
        <div class="noclass-calendar-dow">Mon</div><div class="noclass-calendar-dow">Tue</div><div class="noclass-calendar-dow">Wed</div><div class="noclass-calendar-dow">Thu</div><div class="noclass-calendar-dow">Fri</div><div class="noclass-calendar-dow">Sat</div><div class="noclass-calendar-dow">Sun</div>
        ${days.map(x => x.other ? `<div class="noclass-calendar-day other"></div>` : `<div class="noclass-calendar-day ${noClassDatesSet.has(x.d) ? 'sel' : ''}" data-date="${x.d}" onclick="toggleNoClassDate('${x.d}')">${new Date(x.d).getDate()}</div>`).join('')}
      </div>`;
    chipsWrap.innerHTML = [...noClassDatesSet].sort().map(d => `<span class="noclass-chip">${d}<button type="button" onclick="removeNoClassDate('${d}')">×</button></span>`).join('');
  }
  noClassPickerRender = render;
  window.noclassPrevMonth = () => { viewDate.setMonth(viewDate.getMonth() - 1); noClassPickerRender(); };
  window.noclassNextMonth = () => { viewDate.setMonth(viewDate.getMonth() + 1); noClassPickerRender(); };
  window.toggleNoClassDate = (d) => { if (noClassDatesSet.has(d)) noClassDatesSet.delete(d); else noClassDatesSet.add(d); noClassPickerRender(); };
  window.removeNoClassDate = (d) => { noClassDatesSet.delete(d); noClassPickerRender(); };
  render();
}

function dotClass(type, loc) {
  if ((type||'').toLowerCase() === 'school') return 'school';
  if ((type||'').toLowerCase() === 'gocap') return 'gocap';
  if ((type||'').toLowerCase() === 'private') return 'private';
  if ((loc||'').toLowerCase().includes('randwijck')) return 'randwijck';
  return 'triaz';
}

function debouncedFilter() {
  clearTimeout(searchT);
  searchT = setTimeout(render, 200);
}

async function load() {
  try {
    const term = document.getElementById('termFilter').value;
    const [progs, templates, coachContacts, seasons, stats] = await Promise.all([
      HT.API.programs(),
      HT.API.templates(term ? { season: term } : {}),
      HT.API.coachContacts().catch(() => ({})),
      HT.API.seasons().catch(() => []),
      HT.API.stats(term || '')
    ]);
    programs = progs || [];
    allTemplates = templates;
    allCoaches = Object.keys(coachContacts || {}).filter(Boolean).sort();
    if (!allCoaches.length) allCoaches = [...new Set(templates.flatMap(t => t.coaches || []).filter(Boolean))].sort();

    const termSel = document.getElementById('termFilter');
    termSel.innerHTML = '<option value="">All terms</option>' + (seasons || []).map(s => `<option value="${s}">${s}</option>`).join('');
    if (term) termSel.value = term;

    document.getElementById('statPrograms').textContent = programs.length;
    document.getElementById('statRevenue').textContent = stats?.revenue != null ? HT.eur(stats.revenue) : '—';
    const totalMax = (templates || []).reduce((s, t) => s + (t.max_participants || 0), 0);
    const totalEnrolled = (templates || []).reduce((s, t) => s + (t.enrollment_count || (t.student_ids || []).length), 0);
    document.getElementById('statStudents').textContent = totalEnrolled;
    document.getElementById('statCapacity').textContent = totalEnrolled + '/' + totalMax;

    renderPrograms();
    applyFilter();
  } catch (e) { HT.showError(e.message); }
}

function renderPrograms() {
  const wrap = document.getElementById('programList');
  const withAll = [{ id: null, name: 'All programs', type: 'Club' }, ...programs];
  wrap.innerHTML = withAll.map(p => {
    const cnt = p.id ? allTemplates.filter(t => t.program_id === p.id).length : allTemplates.length;
    const dc = dotClass(p.type, p.location);
    const pid = p.id || '';
    return `<div class="cl-prog-item ${(selectedProgramId === p.id || (selectedProgramId === null && !pid)) ? 'sel' : ''}" data-id="${pid}" onclick="selectProgram('${pid}')">
      <span class="cl-dot ${dc}"></span>${(p.name || 'Unnamed').slice(0, 28)}<span class="cnt">${cnt}</span>
    </div>`;
  }).join('');
}

function selectProgram(id) {
  selectedProgramId = (id && id !== '') ? id : null;
  renderPrograms();
  applyFilter();
}

function applyFilter() {
  const q = (document.getElementById('searchInput').value || '').toLowerCase().trim();
  filteredTemplates = allTemplates.filter(t => {
    if (selectedProgramId && t.program_id !== selectedProgramId) return false;
    if (!q) return true;
    const hay = [t.program_name, t.location, t.type, t.age_group, ...(t.coaches || [])].filter(Boolean).join(' ').toLowerCase();
    return hay.includes(q);
  });
  render();
}

function render() {
  const wrap = document.getElementById('classList');
  const empty = document.getElementById('emptyMsg');
  if (!filteredTemplates.length) {
    wrap.innerHTML = '';
    empty.classList.remove('hidden');
    return;
  }
  empty.classList.add('hidden');
  wrap.innerHTML = filteredTemplates.map(t => {
    const enrolled = t.enrollment_count || (t.student_ids || []).length;
    const max = t.max_participants || 0;
    const pct = max > 0 ? Math.min(100, (enrolled / max) * 100) : 0;
    const isExp = expandedId === t.id;
    const dot = dotClass(t.type, t.location);
    const timeStr = (t.delivery === 'pickup')
      ? `${t.pickup_time || t.start_time} · ${t.lesson_start || t.start_time}–${t.lesson_end || t.end_time}`
      : `${t.start_time}–${t.end_time}`;
    const coachesStr = (t.coaches || []).join(', ') || '—';
    return `
    <div class="cl-class-card ${isExp ? 'exp' : ''}" data-id="${t.id}">
      <div class="cl-class-row" onclick="toggleExpand('${t.id}')">
        <div>
          <div class="cl-class-name"><span class="cl-dot ${dot}"></span>${(t.program_name||'').replace(/</g,'&lt;')}</div>
          <div class="cl-class-meta">${t.day_of_week || '—'} · ${timeStr} · ${t.location || '—'} · ${coachesStr}</div>
        </div>
        <div class="cl-class-enroll">${enrolled}/${max}</div>
        <div style="min-width:100px">
          <div class="cl-class-bar"><div class="cl-class-bar-fill" style="width:${pct}%"></div></div>
        </div>
        <div>
          <button class="cl-btn secondary" style="padding:4px 10px;font-size:11px" onclick="event.stopPropagation();openEditor('${t.id}')">Edit</button>
        </div>
      </div>
      <div class="cl-class-detail ${isExp ? 'show' : ''}" onclick="event.stopPropagation()">
        <div class="cl-detail-h">Students</div>
        <div class="cl-student-list" id="students-${t.id}">${renderStudentChips(t)}</div>
        <div class="cl-add-student-wrap" style="margin-top:8px">
          <button type="button" class="cl-add-student-btn" onclick="openAddStudent('${t.id}')">+ Add student</button>
          <div class="cl-student-dropdown hidden" id="dropdown-${t.id}"></div>
        </div>
      </div>
    </div>`;
  }).join('');

  filteredTemplates.forEach(t => {
    const list = document.getElementById('students-' + t.id);
    if (list) list.querySelectorAll('button[data-remove]').forEach(btn => {
      btn.onclick = () => removeStudent(t.id, btn.dataset.sid);
    });
    const addBtn = document.querySelector(`[onclick="openAddStudent('${t.id}')"]`);
    if (addBtn) addBtn.onclick = () => openAddStudent(t.id);
  });
}

function renderStudentChips(t) {
  const ids = t.student_ids || [];
  if (!ids.length) return '<span style="font-size:11px;color:var(--t4)">No students yet</span>';
  return ids.map(sid => {
    const s = studentMap[sid] || { name: sid, id: sid };
    return `<span class="cl-student-chip">${(s.name || sid).replace(/</g,'&lt;')} <button type="button" data-remove data-sid="${sid}" title="Remove">×</button></span>`;
  }).join('');
}

async function openAddStudent(templateId) {
  const input = document.createElement('input');
  input.type = 'text';
  input.placeholder = 'Search students…';
  input.style.cssText = 'width:100%;padding:8px 12px;background:var(--s1);border:1px solid var(--b2);color:var(--t1);font-size:12px;border-radius:4px;';
  const dropdown = document.getElementById('dropdown-' + templateId);
  const wrap = dropdown.parentElement;
  const oldBtn = wrap.querySelector('.cl-add-student-btn');
  oldBtn.style.display = 'none';
  wrap.insertBefore(input, dropdown);
  input.focus();
  input.onblur = () => setTimeout(() => {
    input.remove();
    oldBtn.style.display = '';
    dropdown.classList.add('hidden');
    dropdown.innerHTML = '';
  }, 200);
  let searchT = null;
  input.oninput = () => {
    clearTimeout(searchT);
    const q = input.value.trim();
    if (q.length < 2) { dropdown.classList.add('hidden'); dropdown.innerHTML = ''; return; }
    searchT = setTimeout(async () => {
      try {
        const results = await HT.API.studentsSearch(q);
        const t = allTemplates.find(x => x.id === templateId);
        const existing = (t?.student_ids || []);
        const opts = (results || []).filter(s => !existing.includes(s.id)).slice(0, 15);
        dropdown.innerHTML = opts.map(s => `<div class="cl-student-opt" data-id="${s.id}">${(s.name||'').replace(/</g,'&lt;')} (${(s.account_owner?.email||'').slice(0,25)})</div>`).join('') || '<div class="cl-student-opt" style="color:var(--t4)">No matches</div>';
        dropdown.classList.remove('hidden');
        dropdown.querySelectorAll('.cl-student-opt[data-id]').forEach(el => {
          el.onclick = () => addStudentToClass(templateId, el.dataset.id);
        });
      } catch (e) {}
    }, 150);
  };
}

async function addStudentToClass(templateId, studentId) {
  try {
    const t = allTemplates.find(x => x.id === templateId);
    if (!t) return;
    const ids = [...(t.student_ids || []), studentId];
    await HT.API.updateTemplate(templateId, { student_ids: ids }, 'template_only');
    const students = await HT.API.students({});
    students.forEach(s => { studentMap[s.id] = s; });
    await load();
  } catch (e) { HT.showError(e.message || e.error); }
}

async function removeStudent(templateId, studentId) {
  try {
    const t = allTemplates.find(x => x.id === templateId);
    if (!t) return;
    const ids = (t.student_ids || []).filter(id => id !== studentId);
    await HT.API.updateTemplate(templateId, { student_ids: ids }, 'template_only');
    await load();
  } catch (e) { HT.showError(e.message || e.error); }
}

function toggleExpand(id) {
  expandedId = expandedId === id ? null : id;
  render();
}

function openEditor(id) {
  editingId = id || null;
  document.getElementById('editorTitle').textContent = id ? 'Edit class' : 'New class';
  document.getElementById('btnDelete').style.display = id ? 'block' : 'none';
  if (id) {
    const t = allTemplates.find(x => x.id === id);
    if (!t) return;
    document.getElementById('fName').value = t.program_name || '';
    document.getElementById('fType').value = t.type || 'Club';
    const delivery = t.delivery || (t.type === 'GoCAP' ? 'pickup' : 'onsite');
    document.querySelector(`input[name="delivery"][value="${delivery}"]`).checked = true;
    document.getElementById('fAge').value = t.age_group || '';
    document.getElementById('fLoc').value = t.location || 'Triaz';
    document.getElementById('fDay').value = t.day_of_week || 'Monday';
    document.getElementById('fStart').value = t.start_time || t.lesson_start || '16:00';
    document.getElementById('fEnd').value = t.end_time || t.lesson_end || '17:00';
    document.getElementById('fPickup').value = t.pickup_time || t.start_time || '15:30';
    document.getElementById('fLessonStart').value = t.lesson_start || t.start_time || '16:00';
    document.getElementById('fLessonEnd').value = t.lesson_end || t.end_time || '17:00';
    document.getElementById('fTerm').value = t.season || '';
    document.getElementById('fTermStart').value = t.term_start || '';
    document.getElementById('fTermEnd').value = t.term_end || '';
    noClassDatesSet = new Set();
    const ncRaw = Array.isArray(t.no_class_dates) ? t.no_class_dates : (typeof t.no_class_dates === 'string' ? t.no_class_dates.split(/[\s,;]+/).map(s => s.trim()).filter(s => /^\d{4}-\d{2}-\d{2}$/.test(s)) : []);
    ncRaw.forEach(d => noClassDatesSet.add(d));
    document.getElementById('fMax').value = t.max_participants || 0;
    document.getElementById('fCost').value = t.cost_per_class ?? '';
    document.getElementById('fCourtFee').value = t.court_fee ?? 0;
    document.getElementById('fNotes').value = t.notes || '';
  } else {
    document.getElementById('editorForm').reset();
    document.getElementById('fMax').value = 0;
    document.getElementById('fCourtFee').value = 0;
    document.querySelector('input[name="delivery"][value="onsite"]').checked = true;
    noClassDatesSet = new Set();
  }
  populateTimeSelects();
  const progSel = document.getElementById('fProgram');
  progSel.innerHTML = '<option value="">No program</option>' + programs.map(p => `<option value="${p.id}">${p.name}</option>`).join('');
  if (id) {
    const tpl = allTemplates.find(x => x.id === id);
    progSel.value = tpl?.program_id || '';
  }
  onTypeChange();
  onDeliveryChange();
  renderCoachChips();
  renderCoachPayRows(allTemplates.find(x => x.id === id) || null);
  HT.API.seasons().then(seasons => {
    const sel = document.getElementById('fTerm');
    sel.innerHTML = ['<option value="">Select term</option>', ...(seasons || []).map(s => `<option value="${s}">${s}</option>`), '<option value="__custom__">Custom range</option>'].join('');
    if (id) {
      const t = allTemplates.find(x => x.id === id);
      if (t?.term_start && t?.term_end) sel.value = '__custom__';
      else sel.value = t?.season || (seasons && seasons[0]) || '';
    } else sel.value = document.getElementById('termFilter').value || (seasons && seasons[0]) || '';
    onTermChange();
  }).catch(() => {});
  HT.API.seasonsConfig().then(cfg => {
    const term = document.getElementById('fTerm').value;
    const range = cfg && term && cfg[term] ? cfg[term] : null;
    initNoClassPicker(range);
  }).catch(() => initNoClassPicker(null));
  document.getElementById('editorMo').classList.add('open');
}

function closeEditor() {
  document.getElementById('editorMo').classList.remove('open');
  editingId = null;
}

function onTypeChange() {
  const type = document.getElementById('fType').value;
  if (type === 'GoCAP') {
    document.querySelector('input[name="delivery"][value="pickup"]').checked = true;
    onDeliveryChange();
  }
}

function onDeliveryChange() {
  const isPickup = document.querySelector('input[name="delivery"]:checked')?.value === 'pickup';
  document.getElementById('onsiteTimes').classList.toggle('hidden', isPickup);
  document.getElementById('pickupTimes').classList.toggle('hidden', !isPickup);
}

function onTermChange() {
  document.getElementById('customRangeRow').style.display = document.getElementById('fTerm').value === '__custom__' ? 'block' : 'none';
}

function renderCoachChips() {
  const wrap = document.getElementById('coachChips');
  wrap.innerHTML = allCoaches.map(n => {
    const sel = editingId ? (allTemplates.find(t => t.id === editingId)?.coaches || []).includes(n) : false;
    return `<span class="cl-chip ${sel ? 'sel' : ''}" data-name="${n.replace(/"/g,'&quot;')}">${n.replace(/</g,'&lt;')}</span>`;
  }).join('');
  wrap.querySelectorAll('.cl-chip').forEach(chip => {
    chip.addEventListener('click', () => { chip.classList.toggle('sel'); renderCoachPayRows(null); });
  });
}

function renderCoachPayRows(template) {
  const wrap = document.getElementById('coachPayRows');
  const selected = [...document.querySelectorAll('#coachChips .cl-chip.sel')].map(c => c.dataset.name);
  if (!selected.length) { wrap.innerHTML = ''; return; }
  const pays = template?.coach_pay || [];
  wrap.innerHTML = selected.map((name, i) => `<div class="cl-pay-row"><span>${name.replace(/</g,'&lt;')}</span><input type="number" step="0.01" min="0" data-coach="${name.replace(/"/g,'&quot;')}" placeholder="€" value="${pays[i] ?? ''}"></div>`).join('');
}

function getFormData() {
  const delivery = document.querySelector('input[name="delivery"]:checked').value;
  const isPickup = delivery === 'pickup';
  return {
    program_name: document.getElementById('fName').value.trim(),
    program_id: document.getElementById('fProgram').value || null,
    type: document.getElementById('fType').value,
    delivery,
    location: document.getElementById('fLoc').value,
    age_group: document.getElementById('fAge').value.trim(),
    day_of_week: document.getElementById('fDay').value,
    start_time: isPickup ? document.getElementById('fPickup').value : document.getElementById('fStart').value,
    end_time: isPickup ? document.getElementById('fLessonEnd').value : document.getElementById('fEnd').value,
    pickup_time: isPickup ? document.getElementById('fPickup').value : null,
    lesson_start: isPickup ? document.getElementById('fLessonStart').value : document.getElementById('fStart').value,
    lesson_end: isPickup ? document.getElementById('fLessonEnd').value : document.getElementById('fEnd').value,
    season: document.getElementById('fTerm').value === '__custom__' ? 'Custom' : document.getElementById('fTerm').value || null,
    term_start: document.getElementById('fTerm').value === '__custom__' ? document.getElementById('fTermStart').value : null,
    term_end: document.getElementById('fTerm').value === '__custom__' ? document.getElementById('fTermEnd').value : null,
    no_class_dates: [...noClassDatesSet].sort().join(', '),
    max_participants: parseInt(document.getElementById('fMax').value, 10) || 0,
    cost_per_class: parseFloat(document.getElementById('fCost').value) || null,
    court_fee: parseFloat(document.getElementById('fCourtFee').value) || 0,
    coaches: [...document.querySelectorAll('#coachChips .cl-chip.sel')].map(c => c.dataset.name),
    coach_pay: [...document.querySelectorAll('#coachChips .cl-chip.sel')].map(c => {
      const name = c.dataset.name;
      const inp = document.querySelector(`#coachPayRows input[data-coach="${(name||'').replace(/"/g,'\\"')}"]`);
      const v = inp ? parseFloat(inp.value) : 0;
      return isNaN(v) ? 0 : v;
    }),
    notes: document.getElementById('fNotes').value.trim(),
  };
}

async function saveClass(ev) {
  ev.preventDefault();
  const data = getFormData();
  if (document.getElementById('fTerm').value === '__custom__' && (!data.term_start || !data.term_end)) {
    HT.showError('Specify start and end dates for custom range');
    return false;
  }
  if (!document.getElementById('fTerm').value && !data.season) {
    HT.showError('Select a term');
    return false;
  }
  try {
    if (editingId) {
      const t = allTemplates.find(x => x.id === editingId);
      await HT.API.updateTemplate(editingId, { ...data, student_ids: t?.student_ids }, 'all');
    } else {
      await HT.API.createTemplate(data);
    }
    closeEditor();
    load();
    HT.showSuccess(editingId ? 'Class updated' : 'Class created');
  } catch (e) { HT.showError(e.message || e.error || 'Save failed'); }
  return false;
}

async function deleteClass() {
  if (!editingId || !confirm('Delete this class? All generated instances will be removed.')) return;
  try {
    await HT.API.deleteTemplate(editingId);
    closeEditor();
    load();
  } catch (e) { HT.showError(e.message || e.error || 'Delete failed'); }
}

document.getElementById('searchInput').addEventListener('input', debouncedFilter);

(async () => {
  const students = await HT.API.students({}).catch(() => []);
  students.forEach(s => { studentMap[s.id] = s; });
  load();
})();
</script>
</body>
</html>
