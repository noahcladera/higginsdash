<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Higgins Tennis — Season Comparison</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/main.css">
<style>
.page{padding:28px 32px;max-width:1200px;}

/* split header */
.split-hd{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--b1);border:1px solid var(--b2);border-radius:8px;overflow:hidden;margin-bottom:28px;}
.sh{background:var(--s1);padding:20px 24px;}
.shn{font-size:12px;font-weight:600;color:var(--t3);margin-bottom:12px;}
.shv{font-size:28px;font-weight:700;letter-spacing:-.5px;line-height:1;margin-bottom:3px;}
.shsub{font-size:11px;color:var(--t3);}

.kpi-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:1px;background:var(--b2);margin-top:14px;border-top:1px solid var(--b2);}
.kpi{background:var(--s1);padding:11px 14px;}
.kpiv{font-size:18px;font-weight:700;line-height:1;}
.kpil{font-size:10px;font-weight:500;color:var(--t3);margin-top:3px;}

/* comparison table */
.cmp{width:100%;border-collapse:collapse;margin-bottom:28px;}
.cmp th{font-size:10px;font-weight:500;color:var(--t3);padding:8px 14px;border-bottom:1px solid var(--b2);}
.cmp th.wth{color:#7a9a80;}
.cmp th.sth{color:var(--orange);}
.cmp td{padding:9px 14px;border-bottom:1px solid rgba(26,48,32,.4);font-size:12px;vertical-align:top;}
.cmp tr:hover td{background:var(--s2);}
.cmp .metric{font-size:11px;font-weight:500;color:var(--t3);}
.cmp .wval{color:var(--c-triaz);}
.cmp .sval{color:var(--orange);}
.delta-neu{color:var(--t4);font-family:"DM Mono",monospace;font-size:10px;}

/* coach comparison */
.coach-cmp{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:8px;margin-bottom:28px;}
.cc{background:var(--s1);border:1px solid var(--b2);border-radius:8px;padding:12px 14px;}
.ccn{font-size:13px;font-weight:700;margin-bottom:8px;}
.cc-row{display:flex;justify-content:space-between;padding:3px 0;font-size:11px;border-bottom:1px solid rgba(26,48,32,.4);}
.cc-row:last-child{border-bottom:none;}
.cc-label{color:var(--t3);}
.w-val{color:var(--c-triaz);font-family:"DM Mono",monospace;font-size:10px;}
.s-val{color:var(--orange);font-family:"DM Mono",monospace;font-size:10px;}

.cmp-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}

@media(max-width:768px){
  .page{padding:20px 24px;}
  .split-hd{grid-template-columns:1fr;margin-bottom:20px;}
  #typeCmp,#dayCmp{grid-template-columns:1fr !important;gap:12px;margin-bottom:20px;}
  .cmp-wrap{margin-bottom:20px;}
}
@media(max-width:480px){
  .page{padding:16px 12px;}
  .sh{padding:16px 18px;}
  .shn{font-size:11px;margin-bottom:10px;}
  .shv{font-size:22px;}
  .shsub{font-size:10px;}
  .kpi-grid{grid-template-columns:1fr;margin-top:12px;}
  .kpi{padding:9px 12px;}
  .kpiv{font-size:16px;}
  .kpil{font-size:9px;}
  .cmp th,.cmp td{font-size:11px;padding:6px 10px;}
  .cmp .metric{font-size:10px;}
  .coach-cmp{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:6px;margin-bottom:20px;}
  .cc{padding:10px 12px;}
  .ccn{font-size:12px;margin-bottom:6px;}
  .cc-row{font-size:10px;}
}
</style>
</head>
<body>
<header>
  <a class="logo" href="/">
    <img class="logo-img" src="/assets/logo.avif" alt="Higgins Tennis" />
    <span class="logo-tag">OPS</span>
  </a>
  <div style="display:flex;align-items:center;gap:12px;">
    <button class="theme-toggle" id="themeToggle" title="Toggle light/dark">Theme</button>
    <span style="font-size:10px;font-weight:500;color:var(--t3)">Season comparison</span>
  </div>
</header>
<nav>
  <a class="ni" href="/">Home</a>
  <a class="ni" href="/calendar">Calendar</a>
  <a class="ni" href="/classes">Classes</a>
  <a class="ni" href="/coaches">Coaches</a>
  <a class="ni" href="/students">Students</a>
  <a class="ni active" href="/seasons">Seasons</a>
  <a class="ni" href="/finance">Finance</a>
</nav>

<div class="page">
  <div id="splitHd" class="split-hd"></div>

  <div class="sec-label">Key Metrics Comparison</div>
  <div class="cmp-wrap">
  <table class="cmp">
    <thead>
      <tr>
        <th>Metric</th>
        <th class="wth">Winter 2026</th>
        <th class="sth">Spring 2026</th>
        <th>Change</th>
      </tr>
    </thead>
    <tbody id="cmpBody"></tbody>
  </table>
  </div>

  <div class="sec-label">Coach Activity — Both Seasons</div>
  <div class="coach-cmp" id="coachCmp"></div>

  <div class="sec-label">Classes by Type — Both Seasons</div>
  <div id="typeCmp" style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:28px;"></div>

  <div class="sec-label">Day Distribution</div>
  <div id="dayCmp" style="display:grid;grid-template-columns:1fr 1fr;gap:16px;"></div>
</div>

<script src="/js/shared.js"></script>
<script>
const HT = window.HT;
const DAYS=['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
const DSHORT=['MON','TUE','WED','THU','FRI','SAT','SUN'];

async function load(){
  const [winter,spring]=await Promise.all([
    HT.API.classes({season:'Winter 2026'}),
    HT.API.classes({season:'Spring 2026'})
  ]);
  render(winter,spring);
}

function stats(classes){
  const a=classes.filter(c=>!c.cancelled);
  const rev=a.reduce((s,c)=>s+(c.session_cost||0),0);
  const exp=a.reduce((s,c)=>s+(c.expenses||0),0);
  const pax=a.reduce((s,c)=>s+(c.participants||0),0);
  const max=a.reduce((s,c)=>s+(c.max_participants||0),0);
  const coaches=[...new Set(a.flatMap(c=>c.coaches).filter(Boolean))];
  return {classes:a.length,rev,exp,net:rev-exp,pax,max,coaches,fill:max>0?Math.round(pax/max*100):0};
}

function delta(w,s,fmt='n'){
  const d=s-w;
  if(d===0) return '<span class="delta-neu">—</span>';
  const cls=d>0?'metric-up':'metric-down';
  const val=fmt==='eur'?HT.eur(Math.abs(d)):fmt==='pct'?Math.abs(d)+'%':Math.abs(d);
  return `<span class="${cls}" style="font-size:10px">${val}</span>`;
}

function render(winter,spring){
  const W=stats(winter), S=stats(spring);

  // Split header
  document.getElementById('splitHd').innerHTML=`
    <div class="sh">
      <div class="shn">Winter 2026</div>
      <div class="shv" style="color:var(--c-triaz)">Jan 5 – Mar 30</div>
      <div class="shsub">School holidays Feb 21–Mar 1</div>
      <div class="kpi-grid">
        <div class="kpi"><div class="kpiv" style="color:var(--c-triaz)">${W.classes}</div><div class="kpil">Classes</div></div>
        <div class="kpi"><div class="kpiv" style="color:var(--c-triaz)">${W.pax}</div><div class="kpil">Students</div></div>
        <div class="kpi"><div class="kpiv" style="color:var(--c-triaz)">${HT.eur(W.rev)}</div><div class="kpil">Revenue</div></div>
        <div class="kpi"><div class="kpiv" style="color:var(--c-triaz)">${W.fill}%</div><div class="kpil">Fill rate</div></div>
      </div>
    </div>
    <div class="sh">
      <div class="shn">Spring 2026</div>
      <div class="shv" style="color:var(--orange)">Apr 1 – Jul 3</div>
      <div class="shsub">BSA / IFS / Amity alt. end dates</div>
      <div class="kpi-grid">
        <div class="kpi"><div class="kpiv" style="color:var(--orange)">${S.classes}</div><div class="kpil">Classes</div></div>
        <div class="kpi"><div class="kpiv" style="color:var(--orange)">${S.pax}</div><div class="kpil">Students</div></div>
        <div class="kpi"><div class="kpiv" style="color:var(--orange)">${HT.eur(S.rev)}</div><div class="kpil">Revenue</div></div>
        <div class="kpi"><div class="kpiv" style="color:var(--orange)">${S.fill}%</div><div class="kpil">Fill rate</div></div>
      </div>
    </div>`;

  // Comparison table
  const metrics=[
    {label:'Total Classes',     w:W.classes,    s:S.classes,    fmt:'n'},
    {label:'Total Students',    w:W.pax,        s:S.pax,        fmt:'n'},
    {label:'Session Revenue',   w:W.rev,        s:S.rev,        fmt:'eur'},
    {label:'Total Expenses',    w:W.exp,        s:S.exp,        fmt:'eur'},
    {label:'Net Profit',        w:W.net,        s:S.net,        fmt:'eur'},
    {label:'Fill Rate',         w:W.fill,       s:S.fill,       fmt:'pct'},
    {label:'Active Coaches',    w:W.coaches.length, s:S.coaches.length, fmt:'n'},
    {label:'GoCAP Runs',        w:winter.filter(c=>c.type==='GoCAP'&&!c.cancelled).length, s:spring.filter(c=>c.type==='GoCAP'&&!c.cancelled).length, fmt:'n'},
    {label:'Club Classes',      w:winter.filter(c=>c.type==='Club'&&!c.cancelled).length,  s:spring.filter(c=>c.type==='Club'&&!c.cancelled).length,  fmt:'n'},
  ];
  document.getElementById('cmpBody').innerHTML=metrics.map(m=>{
    const fv=m.fmt==='eur'?HT.eur:m.fmt==='pct'?v=>v+'%':v=>v;
    const wClass=m.fmt==='eur'&&m.w<0?' metric-down':'';
    const sClass=m.fmt==='eur'&&m.s<0?' metric-down':'';
    return `<tr>
      <td class="metric">${m.label}</td>
      <td class="wval${wClass}">${fv(m.w)}</td>
      <td class="sval${sClass}">${fv(m.s)}</td>
      <td>${delta(m.w,m.s,m.fmt)}</td>
    </tr>`;
  }).join('');

  // Coach comparison
  const allCoaches=[...new Set([...W.coaches,...S.coaches])].sort();
  const wByCoach={}, sByCoach={};
  winter.filter(c=>!c.cancelled).forEach(c=>c.coaches.filter(Boolean).forEach(n=>wByCoach[n]=(wByCoach[n]||0)+1));
  spring.filter(c=>!c.cancelled).forEach(c=>c.coaches.filter(Boolean).forEach(n=>sByCoach[n]=(sByCoach[n]||0)+1));
  document.getElementById('coachCmp').innerHTML=allCoaches.map(n=>`
    <div class="cc">
      <div class="ccn">${n}</div>
      <div class="cc-row"><div class="cc-label">Winter</div><div class="w-val">${wByCoach[n]||0} class${(wByCoach[n]||0)!==1?'es':''}</div></div>
      <div class="cc-row"><div class="cc-label">Spring</div><div class="s-val">${sByCoach[n]||0} class${(sByCoach[n]||0)!==1?'es':''}</div></div>
    </div>`).join('');

  // Type comparison
  const wTypes={}, sTypes={};
  winter.filter(c=>!c.cancelled).forEach(c=>wTypes[c.type]=(wTypes[c.type]||0)+1);
  spring.filter(c=>!c.cancelled).forEach(c=>sTypes[c.type]=(sTypes[c.type]||0)+1);
  const allTypes=[...new Set([...Object.keys(wTypes),...Object.keys(sTypes)])];
  const TYPE_C={'GoCAP':'var(--c-gocap)','Club':'var(--c-triaz)','School':'var(--c-school)','Private':'var(--c-rand)'};

  function makeTypeCard(label, map, col){
    const total=Object.values(map).reduce((s,v)=>s+v,0)||1;
    return `<div class="card">
      <div class="chd"><span class="cht">${label}</span></div>
      <div style="padding:12px 14px;display:flex;flex-direction:column;gap:8px;">
        ${allTypes.map(t=>{const v=map[t]||0;return `
          <div style="display:flex;align-items:center;gap:8px;">
            <div style="font-size:11px;color:var(--t2);min-width:60px">${t}</div>
            <div style="flex:1;height:12px;background:var(--b2);border-radius:2px;overflow:hidden"><div style="height:100%;width:${Math.round(v/total*100)}%;background:${TYPE_C[t]||'var(--t3)'}"></div></div>
            <div style="font-family:'DM Mono',monospace;font-size:10px;color:${col};min-width:20px;text-align:right">${v}</div>
          </div>`}).join('')}
      </div>
    </div>`;
  }
  document.getElementById('typeCmp').innerHTML=makeTypeCard('Winter 2026',wTypes,'var(--c-triaz)')+makeTypeCard('Spring 2026',sTypes,'var(--orange)');

  // Day distribution
  const wDays={}, sDays={};
  DAYS.forEach(d=>{wDays[d]=0;sDays[d]=0;});
  winter.filter(c=>!c.cancelled).forEach(c=>{if(wDays[c.day]!=null)wDays[c.day]++;});
  spring.filter(c=>!c.cancelled).forEach(c=>{if(sDays[c.day]!=null)sDays[c.day]++;});
  const maxDay=Math.max(...Object.values(wDays),...Object.values(sDays),1);

  function makeDayCard(label,map,col){
    return `<div class="card">
      <div class="chd"><span class="cht">${label}</span></div>
      <div style="padding:12px 14px;display:flex;flex-direction:column;gap:6px;">
        ${DAYS.map((d,i)=>{const v=map[d]||0;return `
          <div style="display:flex;align-items:center;gap:8px;">
            <div style="font-family:'DM Mono',monospace;font-size:9px;color:var(--t4);min-width:28px">${DSHORT[i]}</div>
            <div style="flex:1;height:14px;background:var(--b2);border-radius:2px;overflow:hidden"><div style="height:100%;width:${Math.round(v/maxDay*100)}%;background:${col};opacity:.8"></div></div>
            <div style="font-family:'DM Mono',monospace;font-size:10px;color:var(--t3);min-width:14px;text-align:right">${v}</div>
          </div>`}).join('')}
      </div>
    </div>`;
  }
  document.getElementById('dayCmp').innerHTML=makeDayCard('Winter 2026',wDays,'var(--c-triaz)')+makeDayCard('Spring 2026',sDays,'var(--orange)');
}

load();
</script>
</body>
</html>
