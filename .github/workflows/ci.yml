name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    # Dummy values so import-time/build code that reads env doesn't crash.
    # No real services are contacted during lint/typecheck/build.
    env:
      DATABASE_URL: "postgresql://user:pass@localhost:5432/higgins?schema=public"
      DIRECT_URL: "postgresql://user:pass@localhost:5432/higgins?schema=public"
      NEXT_PUBLIC_SUPABASE_URL: "https://example.supabase.co"
      NEXT_PUBLIC_SUPABASE_ANON_KEY: "ci-anon-key"
      SUPABASE_SERVICE_ROLE_KEY: "ci-service-role-key"
      NEXT_PUBLIC_SITE_URL: "http://localhost:3000"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Validate Prisma schema
        run: npx prisma validate

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npx tsx src/lib/classes/session-dates.test.ts

      - name: Build
        run: npm run build
